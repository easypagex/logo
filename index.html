<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔄 EasyPageX // TERMINAL</title>
<style>
  :root{
    --phosphor: #33ff33;
    --phosphor-bright: #7fff7f;
    --phosphor-dim: #114411;
    --bg: #000000;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    background:var(--bg);
    overflow-x:hidden;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Courier New', Courier, monospace;
    color:var(--phosphor);
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 3px
      ),
      radial-gradient(ellipse at center, #001a00 0%, #000000 75%);
    position:relative;
    padding:40px 20px;
  }

  /* CRT scanline sweep overlay */
  body::before{
    content:"";
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    pointer-events:none;
    background:linear-gradient(
      rgba(51,255,51,0.03) 50%,
      rgba(0,0,0,0.05) 50%
    );
    background-size: 100% 4px;
    z-index:2;
    animation: scan-drift 8s linear infinite;
  }

  @keyframes scan-drift{
    from{ background-position: 0 0; }
    to{ background-position: 0 100px; }
  }

  /* Vignette to sell the CRT tube look */
  body::after{
    content:"";
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    pointer-events:none;
    box-shadow: inset 0 0 150px 40px #000;
    z-index:3;
  }

  .terminal-header{
    font-size: clamp(14px, 2.5vw, 20px);
    letter-spacing: 2px;
    margin-bottom: 30px;
    text-shadow: 0 0 5px var(--phosphor), 0 0 10px var(--phosphor);
    animation: flicker-text 3.2s infinite steps(1);
    text-align:center;
  }

  .terminal-header .cursor{
    display:inline-block;
    width:10px;
    background:var(--phosphor);
    margin-left:4px;
    animation: blink 1s steps(1) infinite;
  }

  @keyframes blink{
    0%,49%{ opacity:1; }
    50%,100%{ opacity:0; }
  }

  .logo-wrapper{
    position:relative;
    width: min(40vw, 220px);
    height: min(40vw, 220px);
    display:flex;
    align-items:center;
    justify-content:center;
    margin: 10px 0 40px 0;
    z-index:1;
  }

  #logo{
    width:100%;
    height:100%;
    object-fit:contain;
    cursor:pointer;
    user-select:none;
    -webkit-user-drag:none;
    filter:
      drop-shadow(0 0 6px rgba(51,255,51,0.7))
      drop-shadow(0 0 18px rgba(51,255,51,0.35))
      brightness(1.05);
    animation:
      spin-cw 9s linear infinite,
      flicker-img 2.6s infinite steps(1);
    transform-style: preserve-3d;
  }

  #logo.reverse{
    animation-name: spin-ccw, flicker-img;
  }

  #logo:active{
    filter:
      drop-shadow(0 0 10px rgba(127,255,127,0.9))
      brightness(1.3);
  }

  @keyframes spin-cw{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }

  @keyframes spin-ccw{
    from{ transform: rotate(360deg); }
    to{ transform: rotate(0deg); }
  }

  /* Irregular flicker, IBM-CRT style, no artificial substitution content, just brightness/opacity jitter */
  @keyframes flicker-img{
    0%   { opacity:1; }
    2%   { opacity:0.82; }
    4%   { opacity:1; }
    19%  { opacity:1; }
    21%  { opacity:0.7; }
    23%  { opacity:1; }
    45%  { opacity:1; }
    46%  { opacity:0.85; }
    48%  { opacity:1; }
    70%  { opacity:1; }
    71%  { opacity:0.75; }
    73%  { opacity:1; }
    100% { opacity:1; }
  }

  @keyframes flicker-text{
    0%   { opacity:1; }
    3%   { opacity:0.8; }
    6%   { opacity:1; }
    40%  { opacity:1; }
    41%  { opacity:0.6; }
    43%  { opacity:1; }
    80%  { opacity:1; }
    81%  { opacity:0.85; }
    83%  { opacity:1; }
    100% { opacity:1; }
  }

  .hint{
    font-size: clamp(10px, 1.8vw, 13px);
    color: var(--phosphor);
    opacity:0.65;
    margin-bottom:30px;
    letter-spacing:1px;
    text-align:center;
  }

  .easypagex-btn{
    display:inline-block;
    font-family:'Courier New', Courier, monospace;
    font-size: clamp(16px, 3vw, 22px);
    letter-spacing: 3px;
    color: var(--bg);
    background: var(--phosphor);
    border: 2px solid var(--phosphor);
    padding: 14px 38px;
    text-decoration:none;
    text-transform:uppercase;
    box-shadow:
      0 0 8px var(--phosphor),
      0 0 20px rgba(51,255,51,0.6),
      inset 0 0 10px rgba(0,0,0,0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
    position:relative;
    z-index:1;
  }

  .easypagex-btn:hover{
    background: var(--bg);
    color: var(--phosphor);
    box-shadow:
      0 0 12px var(--phosphor),
      0 0 30px rgba(51,255,51,0.8);
    transform: translateY(-2px);
  }

  .easypagex-btn:active{
    transform: translateY(0px) scale(0.97);
  }

  footer{
    margin-top:50px;
    font-size:11px;
    opacity:0.4;
    letter-spacing:1px;
    text-align:center;
  }

  @media (max-width:480px){
    .logo-wrapper{ width:80vw; height:80vw; }
  }
</style>
</head>
